# Dotfiles Workflow Update Configuration And Documentation In Tandem

## Action

Follow the update-configuration-and-documentation-in-tandem workflow:
1. Edit or add configuration files (e.g., .config/opencode/opencode.json, install.sh).
2. Update documentation files (e.g., CLAUDE.md) to reflect the new configuration or installation steps.
3. Commit both configuration and documentation changes together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .config/opencode/opencode.json, install.sh, CLAUDE.md

