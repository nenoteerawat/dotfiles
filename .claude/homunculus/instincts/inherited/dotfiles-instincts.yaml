# Dotfiles Workflow Document New Feature Or Workflow

## Action

Follow the document-new-feature-or-workflow workflow:
1. Implement or integrate the new feature/tool/workflow.
2. Update or create documentation files (e.g., README.md, CLAUDE.md) to explain usage, setup, and operational notes.
3. Commit documentation changes with a message referencing the new feature/workflow.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: README.md, CLAUDE.md

