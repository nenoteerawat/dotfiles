# vim: ft=tmux
# Theme: matches macOS Terminal.app "Clear Dark".
# bg=default everywhere keeps the terminal's translucent/blurred background.
# Palette: bg #191D27  fg #E0E0E0  sel #273D4C
#          blue #6D96B4  br.blue #67B5ED  dim #465C6D  yellow #C4AC62
set -g mode-style "fg=#E0E0E0,bg=#273D4C"

set -g message-style "fg=#191D27,bg=#6D96B4"
set -g message-command-style "fg=#191D27,bg=#6D96B4"

set -g pane-border-style "fg=#35424C"
set -g pane-active-border-style "fg=#6D96B4"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

# flat bar: inherit terminal bg (translucency/blur), Clear Dark fg
set -g status-style "fg=#E0E0E0,bg=default"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

# left: session name (accent blue); right: host (dim)
set -g status-left "#[fg=#6D96B4,bold] #S #[default]"
set -g status-right "#[fg=#465C6D] #h #[default]"

setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#465C6D,bg=default"
setw -g window-status-activity-style "fg=#C4AC62,bg=default"
# inactive window: dim; active window: bright blue bold (no bg block)
setw -g window-status-format "#[fg=#465C6D] #I #{b:pane_current_path} #[default]"
setw -g window-status-current-format "#[fg=#67B5ED,bold] #I #{b:pane_current_path} #[default]"
